<!DOCTYPE html>
<html>

<head>

    <title>Faculty Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <div class="logo">
        ODLEAVE <span>Connect</span>
    </div>

    <div class="nav-links">

        <a href="/">HOME</a>

        <a href="/student">STUDENT LOGIN</a>

        <a href="/faculty">FACULTY LOGIN</a>

        <a href="/about">ABOUT</a>

    </div>

</div>


<!-- MAIN -->

<div class="main">

    <div class="glass-box">

        <h1>Faculty Login</h1>

        <br>

<form action="/faculty_login" method="POST">

    <input type="text"
    name="name"
    placeholder="Enter Faculty Name"
    required>

    <br><br>

    <input type="password"
    name="password"
    placeholder="Enter Password"
    required>

    <br><br>

    <button type="submit">
        LOGIN
    </button>

</form>

    </div>

</div>

</body>
</html>
